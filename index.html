<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Lizyerith ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="hearts"></div>
<div class="sky">
    <div class="moon"></div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="ground"></div>
    <div class="house">
        <div class="roof"></div>
        <div class="body"></div>
    </div>

    <div class="bird bird1"></div>
    <div class="bird bird2"></div>
    <div class="bird bird3"></div>
</div>

<div id="particles"></div>
<section id="welcome" class="screen active">
<h1>Hola Snoopy Lover 🐶</h1>
<p>Tengo un pequeño desafío para vos.<br>No es difícil, pero el premio vale la pena.</p>
<button id="startBtn">Comenzar</button>
</section>

<section id="quiz" class="screen">
<div class="progress"><div id="progressBar"></div></div>
<p id="status"></p>
<h2 id="question"></h2>
<div id="answers"></div>
</section>

<section id="result" class="screen">
<h1>¡Felicidades!</h1>
<p>Superaste el desafío.</p>
<p id="scoreText"></p>
<button id="chestBtn">Abrir Cofre</button>
</section>

<section id="chest" class="screen">
<div class="chest-box"></div>
<h2>El verdadero premio nunca estuvo dentro del cofre.</h2>
<button id="continue1">Continuar</button>
</section>

<section id="reveal" class="screen">
<h2>Estuvo en cada conversación,<br>cada sonrisa y cada momento compartido.</h2>
<button id="continue2">Continuar</button>
</section>

<section id="proposal" class="screen">
<h1>Lizyerith,<br>¿te gustaría ser mi novia?</h1>
<div class="buttons">
<button id="yesBtn">Sí ❤️</button>
<button id="noBtn">No 🌸</button>
</div>
</section>

<section id="letter" class="screen">
<div class="card" id="letterText"></div>
</section>

<script src="script.js"></script>
</body>
</html>
